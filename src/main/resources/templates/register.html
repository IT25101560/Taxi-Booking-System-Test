<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Register - SwiftRide</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --black:   #080a0f;
            --card:    #111827;
            --border:  #1f2a3a;
            --amber:   #f5a623;
            --white:   #f0f4ff;
            --danger:  #e05555;
        }
        body {
            background: radial-gradient(ellipse at top left, rgba(245,166,35,0.1), transparent), var(--black);
            color: var(--white); font-family: 'DM Sans', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .auth-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 40px; width: 100%; max-width: 400px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); position: relative;
        }
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--amber), #ffd166, transparent); border-radius: 16px 16px 0 0;
        }
        .auth-card h1 { font-family: 'Bebas Neue', sans-serif; color: var(--amber); letter-spacing: 2px; text-align: center; font-size: 36px; margin-bottom: 8px; margin-top: 0;}
        .auth-card p.subtitle { text-align: center; color: #7a8fa8; font-size: 13px; margin-bottom: 24px; }
        .form-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; color: #7a8fa8; text-transform: uppercase; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--white); margin-bottom: 20px; box-sizing: border-box; font-family: 'DM Sans', sans-serif;}
        .form-input:focus { border-color: var(--amber); outline: none; background: rgba(245,166,35,0.04);}
        .btn { width: 100%; padding: 14px; background: var(--amber); color: var(--black); border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;}
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,166,35,0.2); }
        .error { color: var(--danger); font-size: 13px; text-align: center; margin-bottom: 16px; background: rgba(224, 85, 85, 0.1); padding: 10px; border-radius: 6px;}
        .link { display: block; text-align: center; margin-top: 20px; color: var(--amber); text-decoration: none; font-size: 13px; transition: opacity 0.2s;}
        .link:hover { opacity: 0.8; }
    </style>
</head>
<body>
<div class="auth-card">
    <h1>CREATE ACCOUNT</h1>
    <p class="subtitle">Join SwiftRide today</p>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <label class="form-label">Username</label>
        <input type="text" name="name" class="form-input" placeholder="Enter a username" required />

        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required />

        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required />

        <button type="submit" class="btn">SIGN UP</button>
    </form>
    <a th:href="@{/login}" class="link">← Back to Login</a>
</div>
</body>
</html>
