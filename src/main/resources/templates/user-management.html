<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>User Management - SwiftRide Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --black:   #080a0f;
            --deep:    #0d1117;
            --card:    #111827;
            --border:  #1f2a3a;
            --amber:   #f5a623;
            --amber2:  #ffd166;
            --white:   #f0f4ff;
            --muted:   #7a8fa8;
            --danger:  #e05555;
            --blue:    #3b82f6;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            margin: 0; padding: 0;
        }

        /* NAV */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 48px; background: rgba(8,10,15,0.95);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--amber); }
        .nav-logo span { color: var(--white); }
        .nav-links a { color: var(--muted); text-decoration: none; margin-left: 30px; font-size: 13px; font-weight: 500; transition: color 0.2s;}
        .nav-links a:hover, .nav-links a.active { color: var(--amber); }

        /* CONTAINER & LAYOUT */
        .container { padding: 48px; max-width: 1300px; margin: 0 auto; }
        .header-row { margin-bottom: 40px; }
        .header-row h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; margin: 0; letter-spacing: 2px; color: var(--amber); }
        .header-row p { color: var(--muted); margin-top: 8px; font-size: 15px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 32px;
            align-items: start;
        }

        /* FORM CARD */
        .form-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative;
        }
        .form-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--amber), var(--amber2), transparent);
            border-radius: 16px 16px 0 0;
        }
        .form-card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1.5px; margin-bottom: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 14px; box-sizing: border-box; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 8px; color: var(--white);
            font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all .2s;
        }
        .form-input:focus { border-color: var(--amber); background: rgba(245,166,35,0.04); }
        select.form-input option { background: var(--deep); color: var(--white); }

        .submit-btn {
            width: 100%; padding: 16px; margin-top: 10px; background: var(--amber); color: var(--black);
            border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px;
            cursor: pointer; transition: all .2s;
        }
        .submit-btn:hover { background: var(--amber2); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245,166,35,0.2); }

        /* TABLE CARD */
        .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .table-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .table-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1.5px; margin: 0; }
        .count-badge { font-family: 'Space Mono', monospace; font-size: 12px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 100px; color: var(--amber); }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); text-align: left; padding: 18px 24px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 18px 24px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover td { background: rgba(245,166,35,0.02); }

        .data-primary { font-weight: 600; color: var(--white); }
        .data-secondary { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
        .role-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 100px; letter-spacing: 1px; }
        .role-admin { background: rgba(245,166,35,0.15); color: var(--amber); }
        .role-user { background: rgba(59,130,246,0.15); color: var(--blue); }

        .btn-group { display: flex; gap: 8px; }
        .btn-action { background: transparent; border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--white); }
        .btn-edit:hover { background: var(--blue); border-color: var(--blue); }
        .btn-delete:hover { background: var(--danger); border-color: var(--danger); }

        .empty-state { padding: 60px; text-align: center; color: var(--muted); font-style: italic; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(8,10,15,0.85); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; position: relative; }
        .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
        .modal-close:hover { color: var(--danger); }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">SwiftRide <span>ADMIN</span></div>
    <div class="nav-links">
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/users}" class="active">Users</a>
        <a th:href="@{/register-vehicle}">Vehicles</a>
        <a th:href="@{/drivers}">Drivers</a>
        <a th:href="@{/view}">Bookings</a>
        <a th:href="@{/logout}" style="color: var(--danger);">Sign Out</a>
    </div>
</nav>

<div class="container">
    <div class="header-row">
        <h1>User Directory</h1>
        <p>Manage all registered customers and administrators in the system.</p>
    </div>

    <div class="dashboard-grid">

        <!-- LEFT: ADD USER FORM -->
        <div class="form-card">
            <h2>Add New User</h2>
            <form th:action="@{/admin-add-user}" method="post">
                <div class="form-group">
                    <label class="form-label">Username / Full Name</label>
                    <input class="form-input" type="text" name="username" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input class="form-input" type="email" name="email" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input class="form-input" type="text" name="password" required />
                </div>
                <div class="form-group">
                    <label class="form-label">System Role</label>
                    <select class="form-input" name="role" required>
                        <option value="USER">Standard User</option>
                        <option value="ADMIN">Administrator</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">CREATE USER</button>
            </form>
        </div>

        <!-- RIGHT: USER LIST -->
        <div class="table-card">
            <div class="table-header">
                <h2>Registered Accounts</h2>
                <span class="count-badge" th:text="'Total: ' + ${#lists.size(users)}">Total: 0</span>
            </div>

            <table>
                <thead>
                <tr>
                    <th>Username</th>
                    <th>Email Details</th>
                    <th>Security Role</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="userObj : ${users}" th:with="parts=${#strings.arraySplit(userObj, ',')}">
                    <td class="data-primary" th:text="${parts[0]}">Name</td>

                    <td class="data-secondary">
                        <span th:if="${parts.length > 3}" th:text="${parts[3]}"></span>
                        <span th:if="${parts.length <= 3}">N/A</span>
                    </td>

                    <td>
                            <span th:if="${parts.length > 2}"
                                  th:class="${parts[2] == 'ADMIN' ? 'role-badge role-admin' : 'role-badge role-user'}"
                                  th:text="${parts[2]}">ROLE</span>
                    </td>

                    <td class="btn-group">
                        <!-- Edit passes the raw string to the JS function -->
                        <button class="btn-action btn-edit" th:attr="onclick=|openEditModal('${userObj}')|">EDIT</button>

                        <form th:action="@{/delete-user}" method="post" style="margin: 0;" onsubmit="return confirm('Are you sure you want to delete this user?');">
                            <input type="hidden" name="username" th:value="${parts[0]}"/>
                            <button type="submit" class="btn-action btn-delete">DELETE</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(users)}" class="empty-state">No users registered yet.</div>
        </div>

    </div>
</div>

<!-- EDIT USER MODAL -->
<div id="editModal" class="modal-overlay">
    <div class="form-card" style="width: 100%; max-width: 400px; margin: auto;">
        <button class="modal-close" onclick="closeEditModal()">✕</button>
        <h2>Edit User Profile</h2>
        <form th:action="@{/edit-user}" method="post">

            <!-- Hidden field maintains original username so we can find the record in txt file -->
            <input type="hidden" name="originalUsername" id="editOriginalName" />

            <div class="form-group">
                <label class="form-label">Username / Full Name</label>
                <input class="form-input" type="text" name="username" id="editName" required />
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input class="form-input" type="email" name="email" id="editEmail" required />
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="text" name="password" id="editPass" required />
            </div>
            <div class="form-group">
                <label class="form-label">System Role</label>
                <select class="form-input" name="role" id="editRole" required>
                    <option value="USER">Standard User</option>
                    <option value="ADMIN">Administrator</option>
                </select>
            </div>
            <button type="submit" class="submit-btn" style="background: var(--blue);">SAVE CHANGES</button>
        </form>
    </div>
</div>

<script>
    function openEditModal(userDataStr) {
        // userData format: name,password,role,email
        const parts = userDataStr.split(',');

        document.getElementById('editOriginalName').value = parts[0];
        document.getElementById('editName').value = parts[0];
        document.getElementById('editPass').value = parts[1];

        if (parts.length > 2) document.getElementById('editRole').value = parts[2];
        if (parts.length > 3) document.getElementById('editEmail').value = parts[3];

        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    // Close on outside click
    window.onclick = function(event) {
        if (event.target.classList.contains('modal-overlay')) {
            event.target.style.display = "none";
        }
    }
</script>

</body>
</html>
